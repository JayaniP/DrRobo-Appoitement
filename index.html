<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DrRobo Telehealth — Book & Teleconsultation (aiRender)</title>
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <div id="root"></div>

    <!-- React + Babel via CDN: no build step required -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load the doctor directory into browser memory before app.js runs.
         ?v=N is a cache-buster — bump it whenever mockData.js changes. -->
    <script src="./mockData.js?v=3"></script>

    <!-- App.js is also cache-busted. Bump ?v= here every time you push. -->
    <script type="text/babel" data-type="module" src="./app.js?v=3"></script>
  </body>
</html>
